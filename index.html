<!DOCTYPE html>
<html>
<head>
  <title>Product CRUD</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <h1>Product CRUD</h1>

  <!-- Formulário para adicionar produto -->
  <form id="add-product-form">
    <h2>Adicionar Produto</h2>
    <label for="name">Nome:</label>
    <input type="text" id="name" name="name" required>

    <label for="price">Preço:</label>
    <input type="number" id="price" name="price" required step="0.01">

    <!-- Campo de descrição -->
    <label for="description">Descrição:</label>
    <textarea id="description" name="description" required></textarea>

    <button type="submit">Add</button>
  </form>

  <!-- Formulário para atualizar produto -->
  <form id="update-product-form" style="display: none;">
    <h2>Update Product</h2>
    <input type="hidden" id="update-id">
    <label for="update-name">Name:</label>
    <input type="text" id="update-name" name="name" required>

    <label for="update-price">Price:</label>
    <input type="number" id="update-price" name="price" required step="0.01">

    <!-- Campo de descrição -->
    <label for="update-description">Description:</label>
    <textarea id="update-description" name="description" required></textarea>

    <button type="submit">Update</button>
  </form>

  <!-- Lista de produtos -->
  <ul id="products"></ul>

  <script src="app.js"></script>
  <script>
    // Call fetchProducts() when the page loads
    window.addEventListener('load', fetchProducts);
  </script>
</body>
</html>
